site_name: Complexity Benchmarks
site_description: Benchmark datasets for computationally hard problems
docs_dir: site_docs
theme:
  name: material
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.instant
  - navigation.tracking
  - navigation.sections
  - navigation.expand
  - navigation.top
  - search.suggest
  - search.highlight
  - content.tabs.link
  - toc.integrate
plugins:
- search
markdown_extensions:
- tables
- attr_list
- def_list
- pymdownx.highlight
- pymdownx.superfences
nav:
- Home: index.md
- Categories:
  - Satisfiability: 01-satisfiability.md
  - 'Graph: Vertex & Edge': 02-graph-vertex-edge.md
  - 'Graph: Path & Circuit': 03-graph-path-circuit.md
  - 'Graph: Connectivity & Cut': 04-graph-connectivity-cut.md
  - 'Graph: Matching & Isomorphism': 05-graph-matching.md
  - Network Flow: 06-network-flow.md
  - Knapsack & Partition: 07-knapsack-partition.md
  - Scheduling: 08-scheduling.md
  - Set Problems: 09-set-problems.md
  - Sequence & String: 10-sequence-string.md
  - Mathematical Programming: 11-mathematical-programming.md
  - Lattice & Number Theory: 12-lattice-number-theory.md
  - Database & Relational: 13-database-relational.md
  - Physics & Stat Mech: 14-physics-statistical-mechanics.md
  - Vehicle Routing: 15-vehicle-routing.md
  - Facility Location: 16-facility-location.md
  - Constraint Satisfaction: 17-constraint-satisfaction.md
- Competitions: competitions.md
