category: "network-flow"
title: "Network Flow"
description: "Network flow problems with integrality and routing constraints"
problems:
  - name: "Two-Commodity Integral Flow (Directed)"
    pred_names:
      - "DirectedTwoCommodityIntegralFlow"
    datasets:
      - name: "CommaLAB Mnetgen Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/Mnetgen.tgz"
        format: "Mnetgen"
        description: >
          Random multicommodity min-cost flow instances generated by Mnetgen,
          the most widely used random generator for MMCF problems. The enhanced
          C++ version by Antonio Frangioni includes input files for 366 instances
          developed by Paola Cappanera, designed to be harder than the original
          120-instance set. Instances are parameterized by number of nodes,
          commodities, and network density. 80% of arcs have mutual capacity
          constraints and 90% have per-commodity upper bounds. Can be restricted
          to two commodities for two-commodity flow experiments.
        num_instances: 486
        license: "Free for academic use"
        reference: "Frangioni, A. and Cappanera, P. Mnetgen random generator for MMCF instances."

      - name: "CommaLAB Canad C Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/C.tgz"
        format: "Canadian"
        description: >
          32 fixed-charge multicommodity network design instances with 20-30
          nodes, 230-700 arcs, and 40-400 commodities. Collected by Jones,
          Lustig, and Farwolden for testing computational approaches to MMCF.
          Directed networks with varying cost and capacity characteristics.
        num_instances: 32
        node_range: "20-30"
        arc_range: "230-700"
        commodity_range: "40-400"
        license: "Free for academic use"
        reference: "Jones, K.L., Lustig, I.J., and Farwolden, J.M. Multicommodity network flows."

      - name: "SNDlib"
        url: "http://sndlib.zib.de/"
        format: "SNDlib-native/GML"
        description: >
          Survivable Network Design Library containing 22 real telecommunication
          network topologies (including Abilene, Germany50, Nobel-EU, Nobel-US)
          combined with planning parameters to yield 830 problem instances.
          Supports directed and undirected link models, multicommodity and
          single-path routing, and various survivability concepts. Networks
          specify nodes, links, demands, and installable capacity modules
          with costs. Maintained by ZIB (Zuse Institute Berlin).
        num_networks: 22
        num_instances: 830
        license: "Free for academic use"
        reference: "Orlowski, S., Pioro, M., Tomaszewski, A., Wessaely, R. SNDlib 1.0 - Survivable Network Design Library. Networks, 55(3):276-286, 2010."

  - name: "Two-Commodity Integral Flow (Undirected)"
    pred_names:
      - "UndirectedTwoCommodityIntegralFlow"
    datasets:
      - name: "CommaLAB Vance Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/vance.tar.gz"
        format: "JL Origin-Specific"
        description: >
          30 multicommodity flow instances on undirected graphs across three
          groups (p, q, r10). Originally used for testing column generation
          approaches for multicommodity flow. The undirected graph structure
          makes these suitable for undirected two-commodity integral flow
          experiments.
        num_instances: 30
        license: "Free for academic use"
        reference: "Vance, P.H. Column generation approaches to multicommodity flow."

      - name: "CommaLAB Grid Network Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/grid.tgz"
        format: "Origin-Destination"
        description: >
          15 multicommodity flow instances on regular grid graphs with 25 to
          1225 nodes. Each internal node has four incoming and four outgoing
          arcs. Origin-destination commodity structure. Useful as structured
          test instances for integral flow problems on lattice-like topologies.
        num_instances: 15
        node_range: "25-1225"
        license: "Free for academic use"

  - name: "Integral Flow Bundles"
    pred_names:
      - "IntegralFlowBundles"
    datasets:
      - name: "CommaLAB PDS Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/Pds-m.tgz"
        format: "Mnetgen/MPS"
        description: >
          The most famous group of MMCF instances, arising from a patient
          distribution and evacuation model in military conflict scenarios.
          Space-time network formulation with 11 commodities. Instance size
          scales with the planning horizon parameter t (PDS1 through PDS100).
          Widely used by researchers to benchmark multicommodity flow solvers.
          The bundled commodity structure makes these natural test cases for
          integral flow bundle problems.
        num_instances: 24
        num_commodities: 11
        license: "Free for academic use"
        reference: "Carolan, W.J., Hill, J.E., Kennington, J.L., Niemi, S., Wichmann, S.J. An empirical evaluation of the KORBX algorithms for military airlift applications. Operations Research, 38:240-248, 1990."

      - name: "DIMACS 1st Challenge Network Flow Instances"
        url: "http://archive.dimacs.rutgers.edu/pub/netflow/generators/"
        format: "DIMACS"
        description: >
          Network flow benchmark instances and generators from the 1st DIMACS
          Implementation Challenge on Network Flows and Matching (1990-1991).
          Includes the NETGEN generator for random min-cost flow, max-flow,
          and assignment problems. Generated instances range from 200 to 8000
          nodes and 1300 to 35000 arcs. Output in DIMACS graph format with
          arc specifications (from, to, min-cap, max-cap, cost).
        node_range: "200-8000"
        arc_range: "1300-35000"
        license: "Free"
        reference: "Johnson, D.S. and McGeoch, C.C. Network Flows and Matching: First DIMACS Implementation Challenge. AMS, 1993."

      - name: "LEMON Min-Cost Flow Benchmark Data"
        url: "https://lemon.cs.elte.hu/trac/lemon/wiki/MinCostFlowData"
        format: "DIMACS"
        description: >
          Comprehensive collection of min-cost flow benchmark instances in
          DIMACS format with integer data, organized into six families:
          NETGEN (5 variants), GRIDGEN (3 variants), GOTO (2 variants based
          on grid-on-torus), GRIDGRAPH (wide/long/square grids), ROAD
          (based on USA TIGER/Line road data), and VISION (large-scale 3D
          medical imaging grids). All instances have integer costs and
          capacities, suitable for testing integral flow algorithms.
        instance_groups:
          - name: "NETGEN"
            description: "Random networks in 5 variants (NETGEN-8, NETGEN-SR, NETGEN-LO-8, NETGEN-LO-SR, NETGEN-DEG)"
            download_url: "http://lime.cs.elte.hu/~kpeter/data/mcf/netgen/"
          - name: "GRIDGEN"
            description: "Grid-based networks in 3 variants"
            download_url: "http://lime.cs.elte.hu/~kpeter/data/mcf/gridgen/"
          - name: "GOTO"
            description: "Grid-on-torus networks in 2 variants"
            download_url: "http://lime.cs.elte.hu/~kpeter/data/mcf/goto/"
          - name: "GRIDGRAPH"
            description: "Wide, long, and square grid graphs"
            download_url: "http://lime.cs.elte.hu/~kpeter/data/mcf/gridgraph/"
          - name: "ROAD"
            description: "USA road network instances from TIGER/Line data"
            download_url: "http://lime.cs.elte.hu/~kpeter/data/mcf/road/"
          - name: "VISION"
            description: "Large-scale 3D medical imaging grid instances"
            download_url: "http://lime.cs.elte.hu/~kpeter/data/mcf/vision/"
        license: "Free"

  - name: "Integral Flow with Homologous Arcs"
    pred_names:
      - "IntegralFlowHomologousArcs"
    datasets:
      - name: "CommaLAB Canad R Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/R.tgz"
        format: "Canadian"
        description: >
          18 multicommodity network design instances with 10-20 nodes, 35-318
          arcs, and 10-200 commodities. Feature parameterized fixed costs and
          capacities, with arc groups sharing structural properties (homologous
          arc sets with equal-flow constraints). Useful for testing integral
          flow algorithms with arc coupling constraints.
        num_instances: 18
        node_range: "10-20"
        arc_range: "35-318"
        commodity_range: "10-200"
        license: "Free for academic use"
        reference: "Jones, K.L., Lustig, I.J., and Farwolden, J.M. Multicommodity network flows."

      - name: "CommaLAB Canad Bipart and Mulgen Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/Canad.tgz"
        format: "Canadian"
        description: >
          96 instances (32 bipartite transportation networks and 64 general
          Mulgen graphs) for multicommodity network design. Bipartite instances
          have structured arc sets between supply and demand layers, naturally
          encoding homologous arc relationships. General Mulgen instances
          provide diverse topologies for testing.
        num_instances: 96
        license: "Free for academic use"

      - name: "CommaLAB Reserve Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/Reserve.tar.gz"
        format: "Custom"
        description: >
          9 instances addressing network resilience through nonsimultaneous
          multicommodity flow on telecommunication networks. Arc groups must
          satisfy shared capacity constraints under failure scenarios, creating
          homologous arc coupling. Relevant for survivable network design
          with integral flow requirements.
        num_instances: 9
        license: "Free for academic use"

  - name: "Integral Flow with Multipliers"
    pred_names:
      - "IntegralFlowWithMultipliers"
    datasets:
      - name: "CommaLAB Hydrothermal Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/hydroter.tar.gz"
        format: "PPRN"
        description: >
          5 small-to-medium instances from real-world hydrothermal energy
          generation networks. These nonlinear multicommodity flow instances
          model energy conversion processes where flow along arcs undergoes
          gain/loss transformations (multipliers), representing efficiency
          factors in power generation and distribution.
        num_instances: 5
        license: "Free for academic use"

      - name: "CommaLAB Genflot Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/genflot.tar.gz"
        format: "Custom"
        description: >
          22 small-to-very-large nonlinear multicommodity flow instances
          developed for testing decomposition methods. Include arc multiplier
          effects in the flow model. Instance sizes span a wide range to
          test algorithm scalability.
        num_instances: 22
        license: "Free for academic use"
        reference: "Frangioni, A. Generalized bundle methods for nonlinear multicommodity flow."

      - name: "MIPLIB 2017 Network Instances"
        url: "https://miplib.zib.de/"
        format: "MPS"
        description: >
          Mixed-integer programming instances from MIPLIB 2017 that encode
          network flow problems with gain/multiplier constraints. The
          collection of 1065 instances includes fixed-charge network flow
          and network design formulations. The benchmark set of 240 instances
          was selected via a data-driven process. Instances are available in
          MPS format and can be filtered by tags on the MIPLIB website.
        num_instances: 1065
        benchmark_subset: 240
        license: "Free"
        reference: "Gleixner, A. et al. MIPLIB 2017: Data-Driven Compilation of the 6th Mixed-Integer Programming Library. Mathematical Programming Computation, 13:443-490, 2021."

  - name: "Path-Constrained Network Flow"
    pred_names:
      - "PathConstrainedNetworkFlow"
    datasets:
      - name: "CommaLAB Unsplittable Flow (GARR) Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/garr.tgz"
        format: "XML/Mnetgen"
        description: >
          10 unsplittable multicommodity network flow instances derived from
          the GARR Italian Academic and Research Network topology (from Internet
          Topology Zoo). Each commodity must be routed along a single path,
          the most restrictive form of path-constrained flow. Real-world
          telecommunication topology with Mnetgen conversion available.
        num_instances: 10
        license: "Free for academic use"

      - name: "CommaLAB Unsplittable Flow (SNDlib) Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/sndlib.tgz"
        format: "Mnetgen"
        description: >
          23 unsplittable multicommodity flow instances derived from SNDlib
          real telecommunication network topologies. Single-path routing
          constraint requires each commodity to use exactly one path,
          making these path-constrained flow instances. Converted to
          Mnetgen format from the original SNDlib data.
        num_instances: 23
        license: "Free for academic use"

      - name: "CommaLAB Unsplittable Flow (Waxman) Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/waxman.tgz"
        format: "Mnetgen"
        description: >
          2 unsplittable flow instances generated using the Waxman-1 random
          graph model with 100-200 nodes. Traffic demand is reduced to
          n*log(n) commodities, each constrained to a single path. Useful
          for testing path-constrained flow algorithms on random topologies.
        num_instances: 2
        node_range: "100-200"
        license: "Free for academic use"

      - name: "CommaLAB Mingozzi Instances"
        url: "https://commalab.di.unipi.it/datasets/mmcf/"
        download_url: "https://commalab.di.unipi.it/files/Data/MMCF/Mingozzi.tgz"
        format: "Custom"
        description: >
          10 unsplittable multicommodity network design instances in two
          groups of five, each with 30 nodes and several hundred arcs.
          Combine path constraints (single-path routing per commodity)
          with network design decisions (capacity installation).
        num_instances: 10
        num_nodes: 30
        license: "Free for academic use"

      - name: "SNDlib Single-Path Routing Instances"
        url: "http://sndlib.zib.de/"
        format: "SNDlib-native"
        description: >
          Subset of SNDlib problem instances configured with single-path
          (unsplittable) routing model. When the routing model parameter is
          set to single-path, each demand must be routed along exactly one
          path, creating a path-constrained network flow problem. Available
          for all 22 network topologies in the library, yielding challenging
          instances that combine path constraints with capacity planning.
        num_networks: 22
        license: "Free for academic use"
        reference: "Orlowski, S., Pioro, M., Tomaszewski, A., Wessaely, R. SNDlib 1.0 - Survivable Network Design Library. Networks, 55(3):276-286, 2010."

      - name: "DIMACS 13th Challenge: Network Flows 2.0"
        url: "https://coral.ise.lehigh.edu/flow-challenge-2-0/"
        format: "DIMACS"
        description: >
          Ongoing DIMACS implementation challenge (2025-2027) for network
          flow algorithms. The benchmark track collects new and existing
          benchmark instances and generators for minimum cost flow and
          assignment problems. Instance submissions accepted through
          April 2026, with a workshop planned for January 2027 at Lehigh
          University. Provides reference solvers and standardized problem
          format definitions.
        license: "Free"
        reference: "13th DIMACS Implementation Challenge: Network Flows 2.0."
