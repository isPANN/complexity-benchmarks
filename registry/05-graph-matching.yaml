category: "graph-matching"
title: "Graph: Matching & Isomorphism"
description: "Graph isomorphism, subgraph matching, and graph similarity problems"
problems:
  - name: "Subgraph Isomorphism"
    aliases: ["Subgraph Matching", "SI"]
    pred_names: ["SubgraphIsomorphism"]
    datasets:
      - name: "MIVIA ARG Database"
        url: "https://mivia.unisa.it/datasets/graph-database/arg-database/"
        format: "Binary (MIVIA custom)"
        instance_count: 143600
        scale:
          nodes: "up to 2,000"
          graph_types: "168 types: regular meshes, bounded valence, random"
        has_optimal_solution: true
        usage: "Standard benchmark for evaluating graph and subgraph isomorphism algorithms; used by VF2 and VF3"
        reference: "De Santo, M., Foggia, P., Sansone, C., and Vento, M. A large database of graphs and its use for benchmarking graph isomorphism algorithms, Pattern Recognition Letters, 2003"
        notes: "Contains 143,600 unlabeled graphs organized into 168 types generated by six different models (2D/3D/4D regular meshes, bounded valence, random). Each type has thousands of pairs with known isomorphism or subgraph isomorphism relations."

      - name: "MIVIA LDGraphs (Large Dense Graphs)"
        url: "https://mivia.unisa.it/datasets/graph-database/mivia2-graph-database/"
        format: "Binary (MIVIA custom)"
        instance_count: 6350
        scale:
          nodes: "300 to 10,000"
          edge_density: "0.2 to 0.4 (Erdos-Renyi model)"
        has_optimal_solution: true
        usage: "Benchmark for graph matching on large and dense graphs; designed for bioinformatics and social network analysis scale"
        reference: "Carletti, V., Foggia, P., Saggese, A., and Vento, M. Challenging the time complexity of exact subgraph isomorphism for huge and dense graphs with VF3, IEEE TPAMI, 2018"
        notes: "Extends MIVIA ARG with bigger and denser graphs. 2,550 unlabeled and additional labeled target graphs generated with Random Erdos-Renyi model. Unlabeled up to 5,000 nodes, labeled up to 10,000 nodes."

      - name: "Solnon SIP Benchmarks"
        url: "https://perso.liris.cnrs.fr/christine.solnon/SIP.html"
        format: "Text adjacency"
        instance_count: 14621
        scale:
          nodes: "10 to 6,671"
        has_optimal_solution: true
        usage: "Comprehensive benchmark suite for experimental evaluation of subgraph isomorphism solvers including VF2, VF3, Glasgow, LAD, and RI"
        reference: "Solnon, C. Experimental evaluation of subgraph isomorphism solvers, GbR 2019"
        notes: "14,621 instances from eight benchmarks: images and meshes from real applications, LV (Stanford GraphBase, 113 graphs), scale-free networks, si (MIVIA bounded valence/mesh instances), and random instances near phase transition (randERP)."

      - name: "Glasgow Subgraph Solver Test Suite"
        url: "https://github.com/ciaranm/glasgow-subgraph-solver"
        format: "CSV / LAD"
        instance_count: 14621
        scale:
          nodes: "varies (pattern and target graph pairs)"
        has_optimal_solution: true
        usage: "Test suite for the Glasgow constraint-programming based subgraph isomorphism solver; includes non-induced and induced variants"
        reference: "McCreesh, C., Prosser, P., and Trimble, J. The Glasgow Subgraph Solver: Using Constraint Programming to Tackle Hard Subgraph Isomorphism Problem Variants, ICGT 2020"
        notes: "Uses the same Solnon SIP benchmark suite. Glasgow solver introduces supplemental implied constraints based on path counting for strong domain filtering."

  - name: "Graph Isomorphism"
    aliases: ["GI"]
    datasets:
      - name: "Neuen-Schweitzer Benchmark Graphs"
        url: "https://doi.org/10.4230/LIPIcs.ESA.2017.60"
        format: "DIMACS-like"
        scale:
          nodes: "400 to 4,000"
        has_optimal_solution: true
        usage: "Hard benchmark instances specifically designed to challenge state-of-the-art graph isomorphism solvers (Nauty, Traces, Bliss, Conauto)"
        reference: "Neuen, D. and Schweitzer, P. Benchmark Graphs for Practical Graph Isomorphism, ESA 2017"
        notes: "Construction produces small instances that are orders of magnitude more difficult than all previously available benchmarks at comparable sizes. Instances at 1,500 vertices are far harder than generic random graphs with tens of thousands of vertices."

      - name: "MIVIA ARG Database (Graph Isomorphism pairs)"
        url: "https://mivia.unisa.it/datasets/graph-database/arg-database/"
        format: "Binary (MIVIA custom)"
        instance_count: 143600
        scale:
          nodes: "up to 2,000"
          graph_types: "168 types"
        has_optimal_solution: true
        usage: "Widely used for benchmarking graph isomorphism algorithms including VF2 and its successors"
        reference: "De Santo, M., Foggia, P., Sansone, C., and Vento, M. A large database of graphs and its use for benchmarking graph isomorphism algorithms, Pattern Recognition Letters, 2003"
        notes: "Same database as the subgraph isomorphism benchmark but using graph-graph isomorphism pairs. Includes both labeled and unlabeled graph pairs."

  - name: "Maximum Common Subgraph"
    aliases: ["MCS", "Maximum Common Induced Subgraph"]
    datasets:
      - name: "MIVIA ARG Database (Labeled Common Subgraph pairs)"
        url: "https://mivia.unisa.it/datasets/graph-database/arg-database/"
        format: "Binary (MIVIA custom)"
        instance_count: 166000
        scale:
          nodes: "up to 2,000"
        has_optimal_solution: true
        usage: "Benchmark for maximum common subgraph algorithms using labeled graph pairs with known non-trivial common subgraphs"
        reference: "De Santo, M., Foggia, P., Sansone, C., and Vento, M. A large database of graphs and its use for benchmarking graph isomorphism algorithms, Pattern Recognition Letters, 2003"
        notes: "166,000 labeled graphs organized as pairs holding a non-trivial common subgraph. Complements the unlabeled graph pairs used for isomorphism testing."

      - name: "MCS Benchmark (Dilkas collection)"
        url: "https://dilkas.github.io/pdf/mcs_dissertation.pdf"
        format: "LAD"
        instance_count: 73
        scale:
          nodes: "varies (pairs typically similar sizes)"
        has_optimal_solution: true
        usage: "Standard MCS algorithm comparison benchmark aggregated from multiple papers"
        reference: "Dilkas, P. Algorithm Selection for Maximum Common Subgraph, MSc Dissertation, University of Glasgow, 2019"
        notes: "73 pairs of graphs collected from various papers. Most pairs have the same number of vertices. Used for evaluating and comparing MCS solvers and algorithm selection strategies."

  - name: "Graph Edit Distance"
    aliases: ["GED"]
    datasets:
      - name: "IAM Graph Database"
        url: "https://fki.tic.heia-fr.ch/databases/iam-graph-database"
        format: "GXL (Graph Exchange Language)"
        instance_count: 7000
        scale:
          nodes: "varies by dataset (typically 2 to 200)"
        has_optimal_solution: false
        usage: "Standard benchmark for graph edit distance computation, graph classification, and graph-based pattern recognition"
        reference: "Riesen, K. and Bunke, H. IAM Graph Database Repository for Graph Based Pattern Recognition and Machine Learning, SSPR/SPR 2008"
        notes: >
          Contains multiple sub-datasets: Letter (2,250 graphs, 15 classes of distorted letter drawings),
          AIDS (2,000 molecular graphs, 2 classes), GREC (1,100 symbol graphs, 22 classes),
          Fingerprint (fingerprint skeleton graphs), Mutagenicity (4,337 molecular graphs),
          and Protein (600 graphs, 6 classes). Widely used for GED algorithm benchmarking.

      - name: "ICPR 2016 Graph Distance Contest"
        url: "https://gdc2016.greyc.fr/"
        format: "GXL"
        scale:
          nodes: "varies by dataset"
        has_optimal_solution: false
        usage: "Official competition benchmark for exact and approximate graph edit distance methods"
        reference: "Abu-Aisheh, Z., Bougleux, S., Gauzere, B., and Brun, L. Graph edit distance contest: Results and future challenges, Pattern Recognition Letters, 2017"
        notes: "Seven datasets integrated from IAM and GREYC collections: PAH, MAO (GREYC Chemistry), GREC, MUTA (IAM), and monoterpenes (MONOTERP, new). Two challenges: exact/approximate GED computation and graph dissimilarity for classification. 30-second time limit per comparison."

      - name: "GREYC Chemistry Dataset"
        url: "https://brunl01.users.greyc.fr/CHEMISTRY/"
        format: "CML / GXL"
        scale:
          nodes: "typically 2 to 60 atoms per molecule"
          datasets: "Acyclic (183 molecules), Alkane (150), PAH (94), MAO (68)"
        has_optimal_solution: false
        usage: "Molecular graph benchmark for graph edit distance and graph kernel methods with regression targets (boiling point prediction)"
        reference: "Gauzere, B., Brun, L., and Villemin, D. Two new graphs kernels in chemoinformatics, Pattern Recognition Letters, 2012"
        notes: "Four sub-datasets of molecular graphs: Acyclic (with heteroatoms, boiling point regression), Alkane (carbon-only trees), PAH (polycyclic aromatic hydrocarbons, unlabeled cyclic), MAO (monoamine oxidase inhibitors, classification). Standard benchmark used by GEDLIB library."

      - name: "GEDLIB Benchmark Collection"
        url: "https://github.com/dbblumenthal/gedlib"
        format: "GXL"
        scale:
          nodes: "varies (organized by node-count bins)"
        has_optimal_solution: false
        usage: "Unified benchmark collection bundled with the GEDLIB C++ library for GED computation"
        reference: "Blumenthal, D.B. and Gamper, J. GEDLIB: A C++ Library for Graph Edit Distance Computation, GbR 2019"
        notes: "Includes datasets from IAM (AIDS, Fingerprint, GREC, Letter, Mutagenicity, Protein), GREYC Chemistry (Acyclic, Alkane, PAH, MAO), and CMU-GED. Provides standardized edit cost functions for each dataset. Instances organized into bins by graph size."

  - name: "Pattern Matching in Graphs"
    aliases: ["Graph Pattern Matching", "Graph Query Matching"]
    datasets:
      - name: "Stanford GraphBase (LV Benchmark)"
        url: "https://www-cs-faculty.stanford.edu/~knuth/sgb.html"
        format: "Text (SGBformat)"
        instance_count: 113
        scale:
          nodes: "10 to 6,671"
        has_optimal_solution: true
        usage: "Diverse benchmark graphs with various structural properties for subgraph and pattern matching evaluation"
        reference: "Knuth, D.E. The Stanford GraphBase: A Platform for Combinatorial Computing, ACM Press, 1993"
        notes: "Contains 113 graphs with varied properties (connected, biconnected, triconnected, bipartite, planar). Used as the LV benchmark in the Solnon SIP suite by splitting into 50 small pattern graphs and 63 larger target graphs."

  - name: "One-Sided Crossing Minimization"
    aliases: ["Crossing Number", "OSCM"]
    datasets:
      - name: "PACE 2024 One-Sided Crossing Minimization Challenge"
        url: "https://pacechallenge.org/2024/"
        format: "PACE graph format (.gr)"
        instance_count: ~
        scale:
          vertices: "varies"
          edges: "varies"
        has_optimal_solution: true
        usage: "Official PACE 2024 competition benchmark for exact and heuristic one-sided crossing minimization on bipartite graphs"
        reference: "The PACE 2024 Parameterized Algorithms and Computational Experiments Challenge, IPEC 2024"
        notes: "One-sided crossing minimization asks for an ordering of vertices on one side of a bipartite graph that minimizes edge crossings. Relevant to graph drawing and visualization."

      - name: "SNAP Large Network Collection"
        url: "https://snap.stanford.edu/data/"
        format: "TSV edge list"
        instance_count: 80
        scale:
          nodes: "4,039 to 226,000,000"
          edges: "88,234 to 480,000,000"
        has_optimal_solution: false
        usage: "Large-scale real-world networks used for evaluating pattern matching and subgraph query algorithms at scale"
        reference: "Leskovec, J. and Krevl, A. SNAP Datasets: Stanford Large Network Dataset Collection, 2014"
        notes: "Includes social networks, web graphs, citation networks, and road networks. Frequently used as target graphs for evaluating pattern matching scalability in graph database systems."
