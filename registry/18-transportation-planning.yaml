category: "transportation-planning"
title: "Transportation Planning"
description: "Airline, railway, and public transit planning problems"
problems:
  - name: "Airline Crew Scheduling"
    aliases: ["Crew Pairing", "Crew Rostering"]
    datasets:
      - name: "OR-Library Crew Scheduling"
        url: "https://people.brunel.ac.uk/~mastjjb/jeb/orlib/cspinfo.html"
        format: "Custom text"
        instance_count: 10
        scale:
          rows: "2187-43749"
          columns: "7535-1908256"
        has_optimal_solution: false
        usage: "Standard benchmark for set covering formulations of crew scheduling"
        reference: "Beasley & Cao, 1996"

      - name: "ROADEF 2009 Challenge - Disruption Management"
        url: "https://www.roadef.org/challenge/2009/en/"
        format: "Custom text"
        usage: "Airline disruption management: re-scheduling crew and aircraft after disruptions"
        reference: "ROADEF/EURO Challenge 2009"

  - name: "Gate Assignment"
    aliases: ["Airport Gate Assignment Problem", "AGAP"]
    datasets:
      - name: "Airport Gate Assignment MILP"
        url: "https://github.com/marco-cheung/airport-gate-assignment-problem"
        format: "Python/MILP"
        usage: "Gate assignment MILP formulation with example instances"
        reference: "Based on Dorndorf et al., 2007"

  - name: "Railway Timetabling"
    aliases: ["Train Scheduling", "Train Timetabling"]
    datasets:
      - name: "RAS Problem Solving Competition"
        url: "https://connect.informs.org/railway-applications/new-item3/problem-solving-competition682"
        format: "Various"
        usage: "Annual railway optimization competition by INFORMS Railway Applications Section"
        reference: "INFORMS RAS"

      - name: "ROADEF 2014 Challenge - Railway Rolling Stock"
        url: "https://www.roadef.org/challenge/2014/en/"
        format: "Custom text"
        usage: "Rolling stock unit management for SNCF"
        reference: "ROADEF/EURO Challenge 2014"

      - name: "Tim Costly Railway Benchmark"
        url: "https://github.com/potassco/train-scheduling-with-clingo-dl"
        format: "ASP/Custom"
        usage: "Railway scheduling instances for ASP solvers"
        reference: "Abels et al., 2019"

  - name: "Dial-a-Ride Problem"
    aliases: ["DARP"]
    datasets:
      - name: "Cordeau DARP Instances"
        url: "http://neumann.hec.ca/chairedistributique/data/darp/"
        format: "Custom text"
        instance_count: 42
        scale:
          requests: "16-144"
          vehicles: "2-13"
        has_optimal_solution: true
        usage: "Standard DARP benchmark, widely cited"
        reference: "Cordeau & Laporte, 2003"

  - name: "Bus/Transit Network Design"
    aliases: ["Transit Route Network Design Problem", "TRNDP"]
    datasets:
      - name: "Mandl Swiss Network"
        url: "https://doi.org/10.1287/trsc.13.1.1"
        format: "Custom text"
        scale:
          nodes: 15
          links: 21
        has_optimal_solution: false
        usage: "Classic small transit network benchmark, widely used baseline"
        reference: "Mandl, 1980"

      - name: "Mumford Transit Networks"
        url: "https://github.com/RenatoArbex/TransitNetworkDesign"
        format: "Custom text"
        instance_count: 4
        scale:
          nodes: "30-127"
          links: "90-425"
        has_optimal_solution: false
        usage: "Larger transit network design benchmarks"
        reference: "Mumford, 2013"
