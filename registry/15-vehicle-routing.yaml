category: "vehicle-routing"
title: "Vehicle Routing"
description: "Vehicle routing and arc routing problems including capacitated, time-windowed, and pickup-delivery variants"

problems:
  - name: "Capacitated Vehicle Routing Problem"
    aliases: ["CVRP"]
    datasets:
      - name: "CVRPLIB - Uchoa X Instances"
        url: "https://galgos.inf.puc-rio.br/cvrplib/index.php/en/"
        format: "VRPLIB"
        description: >
          The X instance set proposed by Uchoa et al. (2017), widely considered
          the modern standard benchmark for CVRP. Contains 100 instances
          systematically generated by varying depot positioning (central,
          eccentric, random), customer positioning (random, clustered,
          random-clustered), demand distribution, and average route size.
        scale:
          instances: 100
          customers: "100-1000"
        has_optimal_solution: false
        usage: "primary"
        reference: "Uchoa, E., Pecin, D., Pessoa, A., Poggi, M., Vidal, T., & Subramanian, A. (2017). New benchmark instances for the Capacitated Vehicle Routing Problem. European Journal of Operational Research, 257(3), 845-858."
        notes: "De facto standard for evaluating modern CVRP algorithms. Best known solutions maintained on CVRPLIB."

      - name: "CVRPLIB - XL Instances"
        url: "https://galgos.inf.puc-rio.br/cvrplib/index.php/en/"
        format: "VRPLIB"
        description: >
          Large-scale CVRP instances extending the Uchoa X benchmark to
          1,000-10,000 customers, following the same generation principles.
          Released alongside a Best Known Solution (BKS) challenge in January 2026.
        scale:
          customers: "1000-10000"
        has_optimal_solution: false
        usage: "large-scale"
        reference: "Queiroga, E., Sadykov, R., & Uchoa, E. (2025). The XL Instances for the Capacitated Vehicle Routing Problem. arXiv:2601.11467."
        notes: "Introduced for the BKS Challenge starting January 12, 2026."

      - name: "Christofides, Mingozzi & Toth (CMT) Instances"
        url: "https://neo.lcc.uma.es/vrp/vrp-instances/capacitated-vrp-instances/"
        mirror_url: "http://www.vrp-rep.org/datasets/item/2014-0002.html"
        format: "VRPLIB"
        description: >
          Classic CVRP benchmark from Christofides, Mingozzi, and Toth (1979).
          Contains 14 test problems that have been foundational in the
          development of exact and heuristic CVRP algorithms.
        scale:
          instances: 14
          customers: "50-199"
        has_optimal_solution: true
        usage: "classic"
        reference: "Christofides, N., Mingozzi, A., & Toth, P. (1979). The Vehicle Routing Problem. In Combinatorial Optimization, Wiley."
        notes: "All instances solved to optimality. Part of the classic ABEFMP set."

      - name: "Augerat Instances (Sets A, B, P)"
        url: "https://neo.lcc.uma.es/vrp/vrp-instances/capacitated-vrp-instances/"
        format: "VRPLIB"
        description: >
          Three sets of CVRP instances by Augerat et al. (1995). Set A has
          uniformly distributed customers, set B has clustered customers,
          and set P has varied structures. Combined 74 instances.
        scale:
          instances: 74
          customers: "15-100"
        has_optimal_solution: true
        usage: "classic"
        reference: "Augerat, P., Belenguer, J.M., Benavent, E., Corberan, A., Naddef, D., & Rinaldi, G. (1995). Computational Results with a Branch and Cut Code for the Capacitated Vehicle Routing Problem. Technical Report 949-M, Universite Joseph Fourier, Grenoble."
        notes: "Set A: 27 instances, Set B: 23 instances, Set P: 24 instances. Most have known optimal solutions."

      - name: "Golden, Wasil, Kelly & Chao Instances"
        url: "https://neo.lcc.uma.es/vrp/vrp-instances/capacitated-vrp-instances/"
        format: "VRPLIB"
        description: >
          Large-scale CVRP instances by Golden et al. (1998) designed to test
          algorithms on bigger problem sizes than the classic benchmarks.
        scale:
          instances: 20
          customers: "200-480"
        has_optimal_solution: false
        usage: "large-scale"
        reference: "Golden, B.L., Wasil, E.A., Kelly, J.P., & Chao, I-M. (1998). The Impact of Metaheuristics on Solving the Vehicle Routing Problem: Algorithms, Problem Sets, and Computational Results. In Fleet Management and Logistics, Springer."

      - name: "CVRPLIB - Loggi Real-World Instances"
        url: "https://galgos.inf.puc-rio.br/cvrplib/index.php/en/"
        format: "VRPLIB"
        description: >
          Real-world CVRP instances extracted from vehicle routing and facility
          location data in Brazilian cities (Belem, Brasilia, Rio de Janeiro).
          Used in the 12th DIMACS Implementation Challenge.
        scale:
          instances: 6
          customers: "401-1001"
        has_optimal_solution: false
        usage: "real-world"
        notes: "Instances: Loggi-n401-k23 through Loggi-n1001-k31."

      - name: "CVRPLIB - ORTEC Real-World Instances"
        url: "https://galgos.inf.puc-rio.br/cvrplib/index.php/en/"
        format: "VRPLIB"
        description: >
          Real-world CVRP instances derived from a US-based grocery delivery
          service. Distances correspond to real driving times in seconds.
          Used in the 12th DIMACS Implementation Challenge.
        scale:
          instances: 6
          customers: "242-701"
        has_optimal_solution: false
        usage: "real-world"
        notes: "Instances: ORTEC-n242-k12 through ORTEC-n701-k64."

  - name: "Vehicle Routing Problem with Time Windows"
    aliases: ["VRPTW"]
    datasets:
      - name: "Solomon VRPTW Benchmark"
        url: "https://www.sintef.no/projectweb/top/vrptw/solomon-benchmark/"
        format: "Solomon"
        description: >
          The foundational VRPTW benchmark introduced by Solomon (1987). Contains
          56 instances with 100 customers each. Instances are grouped into six
          problem types: R1/R2 (random), C1/C2 (clustered), RC1/RC2 (mixed).
          Type 1 sets have short scheduling horizons (5-10 customers per route),
          type 2 sets have long horizons (30+ customers per route). Over 3000
          publications have used these instances.
        scale:
          instances: 56
          customers: "100"
        has_optimal_solution: true
        usage: "primary"
        reference: "Solomon, M.M. (1987). Algorithms for the Vehicle Routing and Scheduling Problems with Time Window Constraints. Operations Research, 35(2), 254-265."
        notes: "Hierarchical objective: 1) minimize vehicles, 2) minimize total distance. Also available in 25- and 50-customer variants."

      - name: "Gehring & Homberger Large-Scale VRPTW"
        url: "https://www.sintef.no/projectweb/top/vrptw/homberger-benchmark/"
        format: "Solomon"
        description: >
          Large-scale extension of the Solomon VRPTW benchmark by Gehring and
          Homberger (1999). Contains 300 instances with 200 to 1000 customers,
          organized in the same R/C/RC type structure as Solomon. Five size
          categories (200, 400, 600, 800, 1000 customers) with 60 instances each.
        scale:
          instances: 300
          customers: "200-1000"
        has_optimal_solution: false
        usage: "large-scale"
        reference: "Gehring, H. & Homberger, J. (1999). A Parallel Hybrid Evolutionary Metaheuristic for the Vehicle Routing Problem with Time Windows. In Proceedings of EUROGEN99, Jyvaskyla, Finland."
        notes: "Euclidean distances; travel time equals distance. Best known solutions maintained at SINTEF TOP."

      - name: "DIMACS VRPTW Challenge Instances"
        url: "http://dimacs.rutgers.edu/programs/challenge/vrp/vrptw/"
        format: "Solomon"
        description: >
          VRPTW instances used in the 12th DIMACS Implementation Challenge on
          Vehicle Routing Problems (2021-2022). Includes the Solomon and
          Gehring-Homberger instances as well as additional real-world instances.
        scale:
          customers: "100-1000"
        has_optimal_solution: false
        usage: "competition"
        notes: "Part of the 12th DIMACS Implementation Challenge. 60 teams participated across all VRP tracks."

  - name: "Pickup and Delivery Problem with Time Windows"
    aliases: ["PDPTW", "Pickup and Delivery"]
    datasets:
      - name: "Li & Lim PDPTW Benchmark"
        url: "https://www.sintef.no/projectweb/top/pdptw/li-lim-benchmark/"
        format: "Solomon"
        description: >
          Standard benchmark for the Pickup and Delivery Problem with Time Windows
          introduced by Li and Lim (2001). Instances are derived from Solomon
          VRPTW instances by randomly pairing customer locations as
          pickup-delivery pairs. Contains 354 instances across six size categories
          with the same R/C/RC type structure as Solomon.
        scale:
          instances: 354
          tasks: "100-1000"
        has_optimal_solution: false
        usage: "primary"
        reference: "Li, H. & Lim, A. (2001). A Metaheuristic for the Pickup and Delivery Problem with Time Windows. In Proceedings of the 13th IEEE International Conference on Tools with Artificial Intelligence (ICTAI), 333-340."
        notes: >
          Instance counts by size: 100 tasks (56), 200 tasks (60), 400 tasks (60),
          600 tasks (60), 800 tasks (60), 1000 tasks (58). Two instances
          (LRC2_10_8, LRC2_10_9) missing from original dataset.

      - name: "Sartori & Buriol PDPTW Real-World Instances"
        url: "https://github.com/cssartori/pdptw-instances"
        format: "custom"
        description: >
          PDPTW instances based on open data, providing more realistic
          scenarios than the Li & Lim benchmark. Designed to complement
          the standard academic instances with real-world characteristics.
        has_optimal_solution: false
        usage: "real-world"
        reference: "Sartori, C.S. & Buriol, L.S. (2020). A study on the pickup and delivery problem with time windows: Matheuristics and new instances. Computers & Operations Research, 124, 105065."

  - name: "Capacitated Arc Routing Problem"
    aliases: ["CARP"]
    datasets:
      - name: "GDB Instances (Golden, DeArmon & Baker)"
        url: "https://www.uv.es/belengue/carp.html"
        format: "CARP"
        description: >
          Classic CARP benchmark consisting of 23 small instances on random
          graphs. One of the earliest and most widely used CARP benchmark sets.
        scale:
          instances: 23
          nodes: "7-27"
          edges: "11-55"
        has_optimal_solution: true
        usage: "classic"
        reference: "Golden, B.L., DeArmon, J.S., & Baker, E.K. (1983). Computational Experiments with Algorithms for a Class of Routing Problems. Computers & Operations Research, 10(1), 47-56."

      - name: "BCCM / val Instances (Benavent et al.)"
        url: "https://www.uv.es/belengue/carp.html"
        format: "CARP"
        description: >
          Set of 34 CARP instances on random graphs introduced by Benavent,
          Campos, Corberan, and Mota. Larger and more challenging than the
          GDB instances.
        scale:
          instances: 34
          nodes: "24-50"
          edges: "34-97"
        has_optimal_solution: true
        usage: "classic"
        reference: "Benavent, E., Campos, V., Corberan, A., & Mota, E. (1992). The Capacitated Arc Routing Problem: Lower Bounds. Networks, 22(7), 669-690."

      - name: "Eglese / Li Instances (Winter Gritting)"
        url: "https://www.uv.es/belengue/carp.html"
        format: "CARP"
        description: >
          Set of 24 CARP instances derived from a real-world winter gritting
          (road salting) application in Lancashire, UK. Based on actual road
          networks, making them more realistic than random-graph benchmarks.
        scale:
          instances: 24
          nodes: "77-140"
          edges: "98-190"
        has_optimal_solution: false
        usage: "real-world"
        reference: "Li, L.Y.O. (1992). Vehicle Routeing for Winter Gritting. PhD Thesis, Lancaster University. Li, L.Y.O. & Eglese, R.W. (1996). An Interactive Algorithm for Vehicle Routeing for Winter Gritting. Journal of the Operational Research Society, 47, 217-228."
        notes: "File names begin with egl-e and egl-s."

      - name: "KSHS Instances (Kiuchi et al.)"
        url: "https://www.uv.es/belengue/carp.html"
        format: "CARP"
        description: >
          Small set of 6 CARP instances used in parallel branch and bound
          methodology research.
        scale:
          instances: 6
        has_optimal_solution: true
        usage: "supplementary"
        reference: "Kiuchi, M., Shinano, Y., Hirabayashi, R., & Saruwatari, Y. (1995). An Exact Algorithm for the Capacitated Arc Routing Problem Using Parallel Branch and Bound Method. Abstracts of the 1995 Spring National Conference of the Oper. Res. Soc. of Japan, 28-29."

      - name: "BHW Instances (Bach, Hasle & Wohlk)"
        url: "http://dimacs.rutgers.edu/programs/challenge/vrp/carp/"
        format: "CARP"
        description: >
          Set of 20 CARP instances derived from earlier benchmark collections
          (GDB, BCCM, Eglese). Created for the 12th DIMACS Implementation
          Challenge on Vehicle Routing Problems.
        scale:
          instances: 20
        has_optimal_solution: false
        usage: "competition"
        reference: "Bach, L., Hasle, G., & Wohlk, S. (2013). A Lower Bound for the Node, Edge, and Arc Routing Problem. Computers & Operations Research, 40(4), 943-952."
        notes: "Used in the DIMACS 12th Implementation Challenge CARP track alongside DI-NEARP instances."

  - name: "Vehicle Routing Problem"
    aliases: ["VRP"]
    datasets:
      - name: "Christofides & Eilon Instances"
        url: "https://neo.lcc.uma.es/vrp/vrp-instances/capacitated-vrp-instances/"
        format: "VRPLIB"
        description: >
          Early VRP benchmark instances by Christofides and Eilon (1969).
          Contains 15 instances that are among the oldest standard VRP
          benchmarks still in use.
        scale:
          instances: 15
          customers: "13-101"
        has_optimal_solution: true
        usage: "classic"
        reference: "Christofides, N. & Eilon, S. (1969). An Algorithm for the Vehicle-Dispatching Problem. Journal of the Operational Research Society, 20(3), 309-318."
        notes: "9 of 15 instances have known optimal solutions."

      - name: "Taillard CVRP Instances"
        url: "https://neo.lcc.uma.es/vrp/vrp-instances/capacitated-vrp-instances/"
        format: "VRPLIB"
        description: >
          CVRP instances by Taillard (1993) that extended existing benchmarks
          to larger sizes, providing more challenging test cases.
        scale:
          instances: 12
          customers: "75-385"
        has_optimal_solution: false
        usage: "supplementary"
        reference: "Taillard, E. (1993). Parallel Iterative Search Methods for Vehicle Routing Problems. Networks, 23(8), 661-673."

      - name: "VRP-REP Repository"
        url: "http://www.vrp-rep.org/"
        format: "XML (VRP-REP)"
        description: >
          Community-driven repository of VRP instances, solutions, and
          references. Provides a standardized XML format for representing
          diverse VRP variants and maintains links to original benchmark
          datasets.
        has_optimal_solution: false
        usage: "repository"
        notes: "Meta-repository aggregating instances from multiple VRP benchmark sources."

      - name: "DIMACS 12th Implementation Challenge"
        url: "http://dimacs.rutgers.edu/programs/challenge/vrp/"
        format: "mixed"
        description: >
          The 12th DIMACS Implementation Challenge (2021-2022) dedicated to
          Vehicle Routing Problems. Covered multiple VRP tracks: CVRP, VRPTW,
          CARP, and variants. Aimed to create a reproducible picture of the
          state-of-the-art in vehicle routing.
        has_optimal_solution: false
        usage: "competition"
        notes: "60 teams registered across seven tracks. Concluded April 2022 with an online workshop."
